const bx=(bg,fg="#fff",ex={})=>({backgroundColor:bg,color:fg,border:"none",cursor:"pointer",fontFamily:"inherit",...ex});

/* ══════════════════════ MAIN APP ══════════════════════
   NOTE: API calls below hit Anthropic directly with a client-provided key
   for this static/demo build. Before the paid PC beta launch, swap these
   fetch() calls to hit YOUR backend (/backend/server.js in this repo)
   instead — that's what actually protects the key + applies quotas. */
function App(){
  const [apiKey, setApiKey] = useState("");
  const [showKey, setShowKey] = useState(false);
  const [screen, setScreen] = useState("home");
  const [homeTab, setHomeTab] = useState("editor");

  const [vUrl, setVUrl] = useState(null), [vName, setVName] = useState("새 프로젝트");
  const [dur, setDur] = useState(0), [ct, setCt] = useState(0);
  const [play, setPlay] = useState(false), [spd, setSpd] = useState(1);
  const [ratio, setRatio] = useState("16:9");

  const [grade, setGrade] = useState({...GD0});
  const [overlays, setOverlays] = useState([]);
  const [cuts, setCuts] = useState([]);
  const [trimIn, setTrimIn] = useState(0), [trimOut, setTrimOut] = useState(0);
  const [tplId, setTplId] = useState(null);
  const [edHist, setEdHist] = useState([]);
  const [tracks, setTracks] = useState([
    {id:"video",label:"V1",c:K.gradTo||K.acc,items:[]},{id:"text",label:"TXT",c:K.grn,items:[]},
    {id:"audio",label:"A1",c:K.amb,items:[]},{id:"fx",label:"FX",c:K.red,items:[]},
  ]);

  const [tool, setTool] = useState("ai");
  const [showBefore, setShowBefore] = useState(false);
  const [exporting, setExporting] = useState(false), [expPct, setExpPct] = useState(0);

  const [msgs, setMsgs] = useState([{role:"ai",content:"안녕하세요! 저는 당신과 함께 영상을 만드는 EditUs AI예요 🤝\n\n예시\n• \"영화처럼 만들어줘\"\n• \"따뜻하게 색감 바꿔줘\"\n• \"인트로 3초 잘라줘\""}]);
  const [chatIn, setChatIn] = useState(""), [aiWork, setAiWork] = useState(false);

  const [txtIn, setTxtIn] = useState(""), [txtPos, setTxtPos] = useState("bottom");
  const [txtSty, setTxtSty] = useState("subtitle"), [txtClr, setTxtClr] = useState("#ffffff");

  const [cIn, setCIn] = useState(0), [cOut, setCOut] = useState(5);
  const [cat, setCat] = useState("game"), [ckd, setCkd] = useState({});

  const vRef=useRef(null), cRef=useRef(null), fRef=useRef(null), animR=useRef(null), msgEnd=useRef(null);
  const gR=useRef(grade), oR=useRef(overlays), cuR=useRef(cuts), bfR=useRef(false), uR=useRef(null);

  useEffect(()=>{gR.current=grade},[grade]);
  useEffect(()=>{oR.current=overlays},[overlays]);
  useEffect(()=>{cuR.current=cuts},[cuts]);
  useEffect(()=>{bfR.current=showBefore},[showBefore]);
  useEffect(()=>{uR.current=vUrl},[vUrl]);
  useEffect(()=>{msgEnd.current?.scrollIntoView({behavior:"smooth"})},[msgs]);

  useEffect(()=>{
    const draw=()=>{
      const v=vRef.current,c=cRef.current;
      if(c){
        const ctx=c.getContext("2d"),w=c.width||1280,h=c.height||720;
        if(v&&v.readyState>=2&&uR.current){
          const{f,v:vig}=toFilter(gR.current);
          if(bfR.current){
            ctx.filter="none";ctx.drawImage(v,0,0,w,h);
            ctx.save();ctx.beginPath();ctx.rect(w/2,0,w/2,h);ctx.clip();
            ctx.filter=f;ctx.drawImage(v,0,0,w,h);
            ctx.restore();
            ctx.fillStyle="rgba(255,255,255,.4)";ctx.fillRect(w/2-1,0,2,h);
          }else{
            ctx.save();ctx.filter=f;ctx.drawImage(v,0,0,w,h);ctx.restore();
            if(vig>0){const gv=ctx.createRadialGradient(w/2,h/2,h*.3,w/2,h/2,h*.85);gv.addColorStop(0,"rgba(0,0,0,0)");gv.addColorStop(1,`rgba(0,0,0,${vig*.8})`);ctx.fillStyle=gv;ctx.fillRect(0,0,w,h);}
            const cur=v.currentTime;
            oR.current.forEach(ov=>{
              if(cur<ov.s||cur>ov.s+ov.dur)return;
              const fs=ov.size||30,x=w/2,y=ov.pos==="top"?h*.1:ov.pos==="middle"?h*.5:h*.88;
              ctx.save();
              if(ov.style==="subtitle"){ctx.font=`700 ${fs}px system-ui`;const mw=ctx.measureText(ov.text).width;ctx.fillStyle="rgba(0,0,0,.78)";ctx.beginPath();(ctx.roundRect||ctx.rect).call(ctx,x-mw/2-10,y-fs/2-6,mw+20,fs+12,4);ctx.fill();}
              ctx.font=`700 ${fs}px system-ui`;ctx.textAlign="center";ctx.textBaseline="middle";
              ctx.strokeStyle="rgba(0,0,0,.88)";ctx.lineWidth=fs*.1;ctx.lineJoin="round";ctx.strokeText(ov.text,x,y);
              ctx.fillStyle=ov.color||"#fff";ctx.fillText(ov.text,x,y);ctx.restore();
            });
          }
        }else{ctx.fillStyle=K.t1;ctx.fillRect(0,0,w||640,h||360);}
      }
      animR.current=requestAnimationFrame(draw);
    };
    animR.current=requestAnimationFrame(draw);
    return()=>cancelAnimationFrame(animR.current);
  },[]);

  const addH=m=>setEdHist(p=>[{id:Date.now(),m},...p.slice(0,29)]);
  const loadVid=(url,name)=>{if(vUrl)URL.revokeObjectURL(vUrl);setVUrl(url);setVName(name);setGrade({...GD0});setOverlays([]);setCuts([]);setTplId(null);setSpd(1);setPlay(false);setScreen("editor");};
  const onFile=e=>{const f=e.target.files?.[0];if(!f)return;loadVid(URL.createObjectURL(f),f.name.replace(/\.[^.]+$/,""));};
  const onLoaded=()=>{const v=vRef.current,c=cRef.current;if(!v||!c)return;c.width=v.videoWidth||1280;c.height=v.videoHeight||720;const d=v.duration;setDur(d);setTrimIn(0);setTrimOut(d);setCIn(0);setCOut(Math.min(5,d));v.playbackRate=spd;};
  const onTU=()=>{const v=vRef.current;if(!v)return;const c=v.currentTime;setCt(c);if(c>=trimOut){v.pause();v.currentTime=trimIn;setPlay(false);return;}for(const cut of cuR.current){if(c>=cut.s&&c<cut.e){v.currentTime=cut.e;break;}}};
  const togglePlay=()=>{const v=vRef.current;if(!v||!vUrl)return;if(play)v.pause();else{if(v.currentTime>=trimOut)v.currentTime=trimIn;v.play();}};
  const seek=t=>{if(vRef.current)vRef.current.currentTime=Math.max(trimIn,Math.min(trimOut||dur,t));};
  const applyTpl=tp=>{setGrade({...GD0,...tp.g});setTplId(tp.id);addH(`✨ ${tp.n}`);};
  const addCut=(s,e)=>{if(e<=s)return;setCuts(p=>[...p,{id:Date.now(),s,e}]);addH(`✂️ ${fmtT(s)}–${fmtT(e)}`);};
  const addTxt=(text,pos=txtPos,sty=txtSty,clr=txtClr,sa=ct,d=5)=>{setOverlays(p=>[...p,{id:Date.now(),text,pos,style:sty,color:clr,size:30,s:sa,dur:d}]);addH(`💬 "${text}"`);};

  const sendCmd=async()=>{
    if(!chatIn.trim()||aiWork)return;
    const msg=chatIn.trim();setChatIn("");setMsgs(p=>[...p,{role:"user",content:msg}]);setAiWork(true);
    if(!apiKey.trim()){
      setMsgs(p=>[...p,{role:"ai",content:"⚙️ 저와 자유롭게 대화하며 편집하려면 우상단 🔑 설정에서 API 키를 입력해주세요."}]);
      setAiWork(false);return;
    }
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey.trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:500,system:AI_EDIT,messages:[{role:"user",content:`dur=${fmtT(dur)},ct=${fmtT(ct)},spd=${spd}x\n${msg}`}]})});
      const data=await res.json();
      const j=JSON.parse(data.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim());
      setMsgs(p=>[...p,{role:"ai",content:j.message}]);
      for(const a of(j.actions||[])){
        const p=a.params||{};
        if(a.type==="colorGrade")setGrade(prev=>({...prev,...p}));
        else if(a.type==="applyTemplate"){const tp=TPLS.find(t=>t.id===p.id);if(tp)applyTpl(tp);}
        else if(a.type==="addText")addTxt(p.text||msg,p.pos,p.style,p.color,ct,p.duration||5);
        else if(a.type==="cut")addCut(p.start??0,p.end??Math.min((p.start??0)+5,dur));
        else if(a.type==="setSpeed"){setSpd(p.speed||1);if(vRef.current)vRef.current.playbackRate=p.speed||1;}
        else if(a.type==="reset"){setGrade({...GD0});setOverlays([]);setCuts([]);setSpd(1);setTplId(null);}
      }
    }catch(e){setMsgs(p=>[...p,{role:"ai",content:"⚠️ 오류: "+e.message}]);}
    setAiWork(false);
  };

  const doExport=async()=>{
    const c=cRef.current,v=vRef.current;if(!c||!v||exporting)return;
    setExporting(true);setExpPct(0);
    try{
      const s=c.captureStream(30),r=new MediaRecorder(s,{mimeType:"video/webm;codecs=vp9"}),chunks=[];
      r.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
      r.onstop=()=>{const blob=new Blob(chunks,{type:"video/webm"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`${vName}_edited.webm`;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);setExporting(false);setExpPct(0);};
      v.currentTime=trimIn;await new Promise(r=>setTimeout(r,120));r.start(100);v.play();setPlay(true);
      const tot=trimOut-trimIn,iv=setInterval(()=>{setExpPct(Math.min((v.currentTime-trimIn)/tot*100,99));if(v.currentTime>=trimOut||v.paused){clearInterval(iv);v.pause();setPlay(false);r.stop();}},200);
    }catch{setExporting(false);}
  };

  const td=TD[cat]||TD.game,catI=CATS.find(c=>c.id===cat)||CATS[0];
  const doneN=td.ck.filter((_,i)=>ckd[`${cat}-${i}`]).length;
  const QUICK=["영화처럼 만들어줘","따뜻하게 바꿔줘","슬로모션으로","자막 넣어줘","초기화해줘"];

  const KeyModal=showKey?(
    <div style={{position:"fixed",inset:0,backgroundColor:"rgba(20,15,10,.5)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{backgroundColor:K.s1,borderRadius:20,padding:22,width:"100%",maxWidth:360}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><LogoMark sz={22}/><p style={{fontSize:16,fontWeight:800,margin:0}}>API 키로 함께하기</p></div>
        <p style={{fontSize:12,color:K.t2,margin:"0 0 14px"}}>console.anthropic.com에서 발급한 키를 입력하세요.</p>
        <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",backgroundColor:K.s3,border:`1px solid ${K.b1}`,borderRadius:11,padding:"11px 13px",fontSize:13,marginBottom:10}}/>
        <button onClick={()=>setShowKey(false)} style={bx(K.grad,"#fff",{width:"100%",padding:"11px",fontSize:13,fontWeight:700,borderRadius:11})}>저장</button>
      </div>
    </div>
  ):null;

  if(screen==="editor")return(
    <div style={{maxWidth:430,margin:"0 auto",height:"100vh",display:"flex",flexDirection:"column",backgroundColor:K.bg,color:K.t1,overflow:"hidden"}}>
      {KeyModal}
      {vUrl&&<video ref={vRef} src={vUrl} crossOrigin="anonymous" preload="auto" onLoadedMetadata={onLoaded} onTimeUpdate={onTU} onPlay={()=>setPlay(true)} onPause={()=>setPlay(false)} style={{display:"none"}}/>}
      <input ref={fRef} type="file" accept="video/*" onChange={onFile} style={{display:"none"}}/>
      <div style={{backgroundColor:K.s1,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,boxShadow:SHADOW}}>
        <button onClick={()=>setScreen("home")} style={bx(K.s3,K.t2,{padding:"7px 9px",display:"flex",alignItems:"center",gap:4,fontSize:12,fontWeight:600,borderRadius:10})}><ChevL sz={15}/> 홈</button>
        <div style={{flex:1,minWidth:0}}><span style={{fontSize:13,fontWeight:600}}>{vName}</span></div>
        <button onClick={()=>setShowKey(true)} style={bx(K.s3,apiKey?K.grn:K.t3,{padding:"6px 9px",fontSize:11,fontWeight:700,borderRadius:9})}>{apiKey?"🔑ON":"🔑"}</button>
        {vUrl&&<button onClick={doExport} disabled={exporting} style={bx(exporting?K.t3:K.grn,"#fff",{padding:"7px 13px",fontSize:11,fontWeight:700,borderRadius:10})}>{exporting?`${Math.round(expPct)}%`:"내보내기"}</button>}
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        <div style={{backgroundColor:K.t1,display:"flex",alignItems:"center",justifyContent:"center",margin:"12px 16px",borderRadius:18,overflow:"hidden"}}>
          <div style={{position:"relative",aspectRatio:ratio.replace(":","/"),maxHeight:190,maxWidth:"100%",width:"100%"}}>
            <canvas ref={cRef} style={{width:"100%",height:"100%",display:"block"}}/>
            {!vUrl&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:24,textAlign:"center"}}>
              <button onClick={()=>fRef.current?.click()} style={bx(K.grad,"#fff",{padding:"11px 18px",fontSize:13,fontWeight:700,borderRadius:12,display:"flex",alignItems:"center",gap:7})}><Upload sz={14}/> 영상 선택하기</button>
            </div>}
          </div>
        </div>
        {vUrl&&<div style={{padding:"0 16px 12px",display:"flex",alignItems:"center",gap:8}}>
          <button onClick={togglePlay} style={bx(K.grad,"#fff",{width:38,height:38,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"})}>{play?<Pause sz={14}/>:<Play sz={14} style={{marginLeft:2}}/>}</button>
          <span style={{fontSize:11,color:K.t2,...MONO}}>{fmtT(ct)} / {fmtT(trimOut-trimIn)}</span>
        </div>}
        <div style={{display:"flex",backgroundColor:K.s1,margin:"0 16px 10px",borderRadius:14,padding:4,boxShadow:SHADOW}}>
          {[["ai",Sparkles,"AI"],["cut",Scissors,"컷"],["color",Sliders,"색보정"],["text",TypeI,"자막"],["style",Palette,"스타일"]].map(([id,Icon,lbl])=>(
            <button key={id} onClick={()=>setTool(id)} style={bx(tool===id?K.grad:"transparent",tool===id?"#fff":K.t2,{flex:1,padding:"9px 0",fontSize:9,fontWeight:tool===id?700:500,display:"flex",flexDirection:"column",alignItems:"center",gap:3,borderRadius:11})}><Icon sz={16}/>{lbl}</button>
          ))}
        </div>
        {tool==="ai"&&<div style={{padding:"0 16px"}}>
          <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:10}}>{QUICK.map(q=><button key={q} onClick={()=>setChatIn(q)} style={bx(K.s1,K.t2,{padding:"6px 12px",fontSize:10,borderRadius:12,whiteSpace:"nowrap",flexShrink:0,boxShadow:SHADOW})}>{q}</button>)}</div>
          {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:8}}><div style={{maxWidth:"78%",padding:"9px 13px",fontSize:12.5,borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",background:m.role==="user"?K.grad:K.s1,color:m.role==="user"?"#fff":K.t1,boxShadow:m.role==="user"?"none":SHADOW}}>{m.content}</div></div>)}
          <div ref={msgEnd}/>
        </div>}
        {tool==="style"&&<div style={{padding:"0 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{TPLS.map(tp=><button key={tp.id} onClick={()=>applyTpl(tp)} style={bx("transparent",K.t1,{padding:0,border:tplId===tp.id?`2px solid ${K.acc}`:"2px solid transparent",borderRadius:14,overflow:"hidden",boxShadow:SHADOW})}><div style={{height:44,background:tp.preview,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{tp.e}</div><div style={{padding:"8px",backgroundColor:K.s1,fontSize:12,fontWeight:700}}>{tp.n}</div></button>)}</div>}
      </div>
      {tool==="ai"&&<div style={{backgroundColor:K.s1,padding:"12px 16px",display:"flex",gap:8}}>
        <input value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendCmd()} placeholder="AI에게 편집을 말해보세요..." disabled={!vUrl} style={{flex:1,backgroundColor:K.s3,border:`1px solid ${K.b1}`,borderRadius:22,padding:"11px 15px",fontSize:13}}/>
        <button onClick={sendCmd} disabled={aiWork||!vUrl} style={bx(K.grad,"#fff",{width:44,height:44,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"})}><Send sz={17}/></button>
      </div>}
    </div>
  );

  return(
    <div style={{maxWidth:430,margin:"0 auto",height:"100vh",display:"flex",flexDirection:"column",backgroundColor:K.bg,color:K.t1}}>
      {KeyModal}
      <input ref={fRef} type="file" accept="video/*" onChange={onFile} style={{display:"none"}}/>
      <header style={{backgroundColor:K.s1,padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:SHADOW}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><LogoMark sz={28}/><span style={{fontSize:17,fontWeight:800}}><span style={{color:K.t1}}>Edit</span><span style={{background:K.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Us</span></span></div>
        <button onClick={()=>setShowKey(true)} style={bx(K.s3,apiKey?K.grn:K.t2,{padding:"7px 13px",fontSize:12,fontWeight:700,borderRadius:10})}>{apiKey?"🔑 AI ON":"🔑 API 키"}</button>
      </header>
      <main style={{flex:1,overflowY:"auto",padding:16}}>
        {homeTab==="editor"&&<div>
          <div style={{background:K.grad,borderRadius:22,padding:22,marginBottom:18,color:"#fff"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}><LogoMark sz={40}/><div><p style={{fontSize:16,fontWeight:800,margin:0}}>당신과 AI, 함께 편집해요</p></div></div>
            <button onClick={()=>setScreen("editor")} style={bx("#fff",K.t1,{width:"100%",padding:"14px",fontSize:15,fontWeight:800,borderRadius:14})}><Film sz={18}/> 함께 편집 시작하기 →</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
            {[["📊","트렌딩 조사",()=>setHomeTab("trends")],["🎬","영상 편집",()=>setScreen("editor")]].map(([icon,title,action],i)=>(
              <button key={i} onClick={action} style={bx(K.s1,K.t1,{padding:15,borderRadius:16,textAlign:"left",boxShadow:SHADOW})}><div style={{fontSize:21,marginBottom:8}}>{icon}</div><p style={{fontSize:12,fontWeight:700,margin:0}}>{title}</p></button>
            ))}
          </div>
        </div>}
        {homeTab==="trends"&&<div>
          <h2 style={{fontSize:18,fontWeight:800,marginBottom:14}}>📊 트렌딩 주제 조사</h2>
          <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16}}>{CATS.map(c=><button key={c.id} onClick={()=>setCat(c.id)} style={bx(cat===c.id?c.c:K.s3,cat===c.id?"#fff":K.t2,{padding:"5px 12px",fontSize:11,fontWeight:700,borderRadius:18,flexShrink:0})}>{c.l}</button>)}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>{td.st.map((s,i)=><div key={i} style={{backgroundColor:K.s1,borderRadius:14,padding:14,boxShadow:SHADOW}}><div style={{fontSize:18}}>{s.i}</div><div style={{fontSize:18,fontWeight:800}}>{s.v}</div><div style={{fontSize:10,color:K.t3}}>{s.l}</div></div>)}</div>
        </div>}
      </main>
      <nav style={{display:"flex",backgroundColor:K.s1,padding:"6px 10px"}}>
        {[["editor",Film,"에디터"],["trends",TUp,"트렌드"]].map(([id,Icon,lbl])=>(
          <button key={id} onClick={()=>setHomeTab(id)} style={bx("transparent",homeTab===id?K.acc:K.t3,{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 0",borderRadius:12,backgroundColor:homeTab===id?K.accSoft:"transparent"})}><Icon sz={20}/><span style={{fontSize:9,fontWeight:homeTab===id?700:500}}>{lbl}</span></button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
window.__markBooted();
</script>
</body>
</html>
