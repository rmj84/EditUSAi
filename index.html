*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow:hidden;background:#f7f5f2;font-family:'Poppins',-apple-system,BlinkMacSystemFont,sans-serif}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#d5cec2;border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:#b8ad9c}
::-webkit-scrollbar-track{background:transparent}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer;background:#e3ddd4}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:linear-gradient(135deg,#1a1a1a,#8b2fd6);cursor:pointer;box-shadow:0 2px 6px rgba(139,47,214,.4)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes b1{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.sp{animation:spin 1s linear infinite}
.b1{animation:b1 1s infinite}.b2{animation:b1 1s .15s infinite}.b3{animation:b1 1s .3s infinite}
.fadein{animation:fadeIn .15s ease}
button{transition:transform .1s ease, opacity .1s ease, box-shadow .15s ease}
button:hover:not(:disabled){opacity:.92}
button:active:not(:disabled){transform:scale(.97)}
button:disabled{cursor:not-allowed;opacity:.5}
[data-hoverlift]:hover{transform:translateY(-1px)}
</style>

                <span>🔴 부정 {chResult.comment_sentiment.negative}%</span>
              </div>
              <p style={{fontSize:13,color:K.t2,margin:0,lineHeight:1.7}}>{chResult.comment_sentiment.summary}</p>
            </div>}
            {chResult.recommendations&&<div style={{backgroundColor:K.accSoft,borderRadius:16,padding:18,boxShadow:SHADOW}}>
              <span style={{...LBL,color:K.acc}}>💡 다음 영상 제안</span>
              {chResult.recommendations.map((r,i)=><div key={i} style={{fontSize:13,color:K.t2,padding:"6px 0"}}>• {r}</div>)}
            </div>}
          </div>}
        </div>}
      </main>
    </div>
  );

  /* ═══════════════ MOBILE FALLBACK (compact, single column) ═══════════════ */
  const MobileApp=()=>(
    <div style={{maxWidth:430,margin:"0 auto",height:"100vh",display:"flex",flexDirection:"column",backgroundColor:K.bg,color:K.t1}}>
      {KeyModal}
      <input ref={fRef} type="file" accept="video/*" onChange={onFile} style={{display:"none"}}/>
      <header style={{backgroundColor:K.s1,padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:SHADOW}}>
        <button onClick={()=>{setScreen("home");setHomeTab("editor");}} title={t("home")} data-hoverlift style={bx("transparent","inherit",{display:"flex",alignItems:"center",gap:8,padding:0,borderRadius:9})}><LogoMark sz={26}/><span style={{fontSize:16,fontWeight:800}}><span style={{color:K.t1}}>Edit</span><span style={{background:K.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Us</span></span></button>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          <ThemeToggle/>
          <button onClick={()=>setShowKey(true)} style={bx(K.s3,apiKey?K.grn:K.t2,{padding:"7px 12px",fontSize:11,fontWeight:700,borderRadius:9})}>{apiKey?"🔑 ON":"🔑"}</button>
        </div>
      </header>
      <main style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",gap:14}}>
        <LogoMark sz={48}/>
        <p style={{fontSize:15,fontWeight:700}}>더 넓은 화면에서 만나요</p>
        <p style={{fontSize:13,color:K.t3,lineHeight:1.7}}>EditUs는 PC 환경에 맞춰 최적화되어 있어요.<br/>노트북이나 데스크탑에서 열어보시면<br/>3-패널 편집기와 전체 기능을 이용할 수 있어요.</p>
        <button onClick={()=>fRef.current?.click()} style={bx(K.grad,"#fff",{padding:"13px 24px",fontSize:13,fontWeight:700,borderRadius:12})}>모바일에서도 간단 편집 시작</button>
      </main>
    </div>
  );

  return isDesktop ? (screen==="editor" ? DesktopEditor() : DesktopHome()) : MobileApp();
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
window.__markBooted();
</script>
</body>
</html>
