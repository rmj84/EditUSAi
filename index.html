@keyframes spin{to{transform:rotate(360deg)}}
@keyframes b1{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.sp{animation:spin 1s linear infinite}
.b1{animation:b1 1s infinite}.b2{animation:b1 1s .15s infinite}.b3{animation:b1 1s .3s infinite}
.fadein{animation:fadeIn .15s ease}
button{transition:transform .1s ease, opacity .1s ease, box-shadow .15s ease}
button:hover:not(:disabled){opacity:.92}
button:active:not(:disabled){transform:scale(.97)}
button:disabled{cursor:not-allowed;opacity:.5}
[data-hoverlift]:hover{transform:translateY(-1px)}

  useEffect(()=>{
    const draw=()=>{

            {[["시작",cIn,setCIn,K.red],["끝",cOut,setCOut,K.grn]].map(([l,v,s,c],i)=>(<div key={i} style={{marginBottom:i===0?12:16}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:11,fontWeight:700,color:c}}>{l}</span><span style={{fontSize:11,fontWeight:700,color:c,...MONO}}>{fmtT(v)}</span></div><input type="range" min={0} max={dur} step={0.1} value={v} onChange={e=>s(Number(e.target.value))} style={{accentColor:c}}/></div>))}

          {tool==="color"&&<div>

            {gSlider("채도","saturation",0,2,"#d1478f")}{gSlider("대비","contrast",0.5,1.8,"#e0742a")}{gSlider("온도","temperature",-1,1,"#d99a1f")}{gSlider("Lift","lift",-1,1,K.t2)}{gSlider("Gamma","gamma",0.3,1.7,K.t2)}{gSlider("Gain","gain",0.3,1.7,K.t1)}{gSlider("비네팅","vignette",0,1,K.t3)}
          </div>}

          {tool==="text"&&<div>
            <input value={txtIn} onChange={e=>setTxtIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&txtIn.trim()&&(addTxt(txtIn.trim()),setTxtIn(""))} placeholder="자막 텍스트..." style={{width:"100%",backgroundColor:K.s3,border:`1px solid ${K.b1}`,borderRadius:10,padding:"10px 13px",fontSize:13,marginBottom:12}}/>
            <div style={{display:"flex",gap:6,marginBottom:12}}>{["top","middle","bottom"].map(p=><button key={p} onClick={()=>setTxtPos(p)} data-hoverlift style={bx(txtPos===p?K.grad:K.s3,txtPos===p?"#fff":K.t2,{flex:1,padding:"8px",fontSize:11,fontWeight:600,borderRadius:8})}>{p==="top"?"상단":p==="middle"?"중앙":"하단"}</button>)}</div>
            <div style={{display:"flex",gap:7,marginBottom:14}}>{["#ffffff","#ffff00","#ff4444","#44ff88","#44aaff"].map(c=><div key={c} onClick={()=>setTxtClr(c)} style={{width:26,height:26,backgroundColor:c,borderRadius:"50%",cursor:"pointer",border:`2px solid ${txtClr===c?K.acc:"transparent"}`}}/>)}</div>
            <button onClick={()=>{if(txtIn.trim()){addTxt(txtIn.trim());setTxtIn("");}}} data-hoverlift style={bx(K.grad,"#fff",{width:"100%",padding:"11px",fontSize:13,fontWeight:700,borderRadius:10})}><Plus sz={13}/> 자막 추가</button>
          </div>}

          {tool==="style"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{TPLS.map(tp=><button key={tp.id} onClick={()=>applyTpl(tp)} data-hoverlift style={bx("transparent",K.t1,{padding:0,border:tplId===tp.id?`2px solid ${K.acc}`:"2px solid transparent",borderRadius:12,overflow:"hidden"})}><div style={{height:52,background:tp.preview,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{tp.e}</div><div style={{padding:"8px",backgroundColor:K.s3,fontSize:11,fontWeight:700}}>{tp.n}</div></button>)}</div>}
        </div>
      </div>
    </div>
  );

          </div>
        </div>}
      </main>

  );

  return isDesktop ? (screen==="editor" ? DesktopEditor() : DesktopHome()) : MobileApp();
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
window.__markBooted();
</script>
